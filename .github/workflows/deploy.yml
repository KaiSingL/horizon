name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false

      # Point the repo's Pages site at gh-pages (fixes master/source publishes)
      - name: Configure GitHub Pages source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'

          # Try update first, then create if Pages was never enabled
          CODE=$(curl -sS -o /tmp/pages_resp.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$OWNER/$REPO/pages" \
            -d "$BODY")
          echo "PUT /pages → HTTP $CODE"
          cat /tmp/pages_resp.json || true

          if [ "$CODE" = "404" ]; then
            CODE=$(curl -sS -o /tmp/pages_resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$OWNER/$REPO/pages" \
              -d "$BODY")
            echo "POST /pages → HTTP $CODE"
            cat /tmp/pages_resp.json || true
          fi

          # Non-fatal if token lacks admin (user must set branch once in UI)
          if [ "$CODE" != "200" ] && [ "$CODE" != "201" ] && [ "$CODE" != "204" ]; then
            echo "::warning::Could not auto-configure Pages (HTTP $CODE). Set Settings → Pages → Branch: gh-pages / (root)"
          fi
