name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Skip re-entry when this workflow commits the production site back to master
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure .nojekyll
        run: touch dist/.nojekyll

      # Publish built site onto master root so "Deploy from branch → master" works
      - name: Sync production build onto master
        run: |
          set -e
          rm -rf assets
          cp -R dist/assets assets
          cp dist/index.html index.html
          cp dist/favicon.svg favicon.svg
          cp dist/.nojekyll .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets favicon.svg .nojekyll
          if git diff --cached --quiet; then
            echo "No site changes to commit"
          else
            git commit -m "deploy: production site for GitHub Pages [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
