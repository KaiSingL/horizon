name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Don't cancel mid-publish (racing pushes left Pages on old commits)
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify fresh bundle
        run: |
          set -e
          JS=$(ls dist/assets/index-*.js | head -n1)
          echo "Built $JS ($(wc -c < "$JS") bytes)"
          # Old per-frame spin fudge must not appear
          if grep -qE 'Math\.abs\([^)]+\)\*\.02\*Math\.sign' "$JS"; then
            echo "::error::Bundle still has old spin fudge — entry graph is stale"
            exit 1
          fi
          touch dist/.nojekyll
          test -f dist/index.html
          echo "Bundle OK"

      - name: Sync production build onto master (Pages root)
        run: |
          set -e
          rm -rf assets docs
          mkdir -p docs
          cp -R dist/. docs/
          cp dist/index.html index.html
          cp -R dist/assets assets
          cp dist/favicon.svg favicon.svg 2>/dev/null || true
          cp dist/.nojekyll .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets docs favicon.svg .nojekyll vite.config.js
          if git diff --cached --quiet; then
            echo "No site changes"
          else
            git commit -m "deploy: production site for GitHub Pages [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
